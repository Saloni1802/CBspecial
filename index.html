<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My One & Only ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* 🎬 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  text-align: center;
  padding: 20px;
  animation: fadeOut 2s ease 6s forwards;
}

.fadeText {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

.t1 { animation-delay: 0s; }
.t2 { animation-delay: 2s; }
.t3 { animation-delay: 4s; }

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* 💖 MAIN */
#main {
  display: none;
  text-align: center;
  background: linear-gradient(135deg, #ffd1dc, #ffe6eb);
  height: 100vh;
  padding: 80px 20px 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  color: #b30059;
  font-size: 32px;
}

p {
  color: #444;
  font-size: 16px;
}

.buttons {
  margin-top: 40px;
}

/* YES */
#yes {
  padding: 12px 28px;
  font-size: 18px;
  background: #00b894;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.4s ease; /* smooth cinematic growth */
  position: relative;
  z-index: 1;
}

/* NO */
#no {
  padding: 10px 18px;
  font-size: 14px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 10px;
  position: fixed;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 9999; /* prevents overlap bug */
}

/* FLOAT */
.float {
  position: fixed;
  font-size: 20px;
  animation: rise 4s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 💥 SOFT SHAKE */
@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0, 0); }
}

.shake {
  animation: shake 0.3s;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="fadeText t1">To My One & Only ❤️</div>
  <div class="fadeText t2">From S 😌</div>
  <div class="fadeText t3">Happy Birthday, My Precious 🎂✨</div>
</div>

<!-- MAIN -->
<div id="main">
  <h1>Choose wisely…</h1>
  <p>Your future depends on this 😌</p>

  <div class="buttons">
    <button id="yes">Yes 💚</button>
    <button id="no">No ❌</button>
  </div>

  <!-- 🎧 YOUR AUDIO -->
  <audio id="voice" src="HBD music bayside-breeze.mp3" preload="auto"></audio>
</div>

<script>
// show main
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 6500);

// tap anywhere = start music
document.body.addEventListener("click", () => {
  document.getElementById("voice").play().catch(() => {});
}, { once: true });

// messages
let messages = [
   "Are you sure SJ deserves this? 🤨",
  "Think again habibi 😏",
  "Wrong answer 😤",
  "Dubai boy behave 😌",
  "Last chance 😭",
  "Pookie please 🥺",
  "You really said no?? 😳",
  "Testing me? brave 😤",
  "Final warning ⚠️",
  "I will remember this 🙂",
  "Excuse me?? audacity much 😭",
  "Wrong… but confidently wrong 😌",
  "You woke up and chose chaos huh 😏",
  "Luxury taste but poor decisions 😏",
  "You had ONE job 😭",
  "Try again with brain ON pls 😤",
  "Okay drama king relax 😭",
  "You really pressed that?? 😳",
  "Not you embarrassing yourself voluntarily 😭",
  "I’m pretending I didn’t see that 😏",
  "You tried… that’s what matters 🥺",
  "This is why we double check things 😭",
  "My expectations were low but WOW 😭",
  "Do you need a minute to rethink? 😤",
  "Try again but this time… with sense 😭",
  "That was a choice… not a good one 😏",
  "I love the confidence, hate the result 😳",
  "Not you doing this with full confidence 😭",
  "I’m concerned but also entertained 😳",
  "You had potential… where did it go 😭",
  "This is why we don’t rush things 😌",
  "It’s the confidence for me 😏",
  "I wish I could unsee that 😭",
  "I’m judging… silently but deeply 😏"
  "Delulu level: expert 😌✨",];

let i = 0;
let growth = 1;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

function moveButton() {
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;
  const padding = 20;

  let x = Math.random() * (window.innerWidth - btnWidth - padding) + padding;
  let y = Math.random() * (window.innerHeight - btnHeight - padding) + padding;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.transform = "none";

  noBtn.innerText = messages[i % messages.length];
  i++;

  // soft shake
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 300);

  // slow cinematic growth
  growth += 0.08;
  yesBtn.style.transform = `scale(${growth})`;
}

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

// YES CLICK → CINEMATIC END
yesBtn.addEventListener("click", () => {
  const audio = document.getElementById("voice");
  audio.currentTime = 0;
  audio.play().catch(() => {});

  document.body.innerHTML = `
    <style>
      body {
        background: black;
        color: white;
        text-align: center;
        font-family: 'Playfair Display', serif;
      }

      .fade {
        opacity: 0;
        animation: fadeIn 2s ease forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      .title {
        margin-top: 120px;
        font-size: 42px;
        color: #ff4d88;
        text-shadow: 0 0 20px #ff4d88;
      }

      .text {
        margin-top: 20px;
        font-size: 20px;
      }

      .float {
        position: fixed;
        font-size: 24px;
        animation: rise 5s linear infinite;
      }

      @keyframes rise {
        0% { transform: translateY(100vh); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
      }
    </style>

    <div class="fade title">YAAAYYY! HBDML 😍❤️</div>
    <div class="fade text" style="animation-delay:1s;">You chose me… growth is visible ✨</div>
    <div class="fade text" style="animation-delay:2s;">From your SJ… the best decision you ever made 💖😌</div>
    <div class="fade text" style="animation-delay:3s;">You chose wisely!..shocking but proud 😌💅</div>
    <div class="fade text" style="animation-delay:4s;">Your gift = Me 😌✨ (non-refundable, premium edition)</div>
    <div class="fade text" style="animation-delay:5s;">Now call & love SJ ASAP ..no negotiations 📞</div>
  `;

  setInterval(() => {
    let el = document.createElement("div");
    el.className = "float";
    let items = ["💖","✨","🥂","❤️"];
    el.innerText = items[Math.floor(Math.random()*items.length)];
    el.style.left = Math.random()*window.innerWidth + "px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  },200);
});
</script>

</body>
</html>
