<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My One & Only ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* 🎬 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  text-align: center;
  padding: 20px;
  animation: fadeOut 2s ease 6s forwards;
}

.fadeText {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

.t1 { animation-delay: 0s; }
.t2 { animation-delay: 2s; }
.t3 { animation-delay: 4s; }

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* 💖 MAIN */
#main {
  display: none;
  text-align: center;
  background: linear-gradient(135deg, #ffd1dc, #ffe6eb);
  height: 100vh;
  padding: 80px 20px 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  color: #b30059;
  font-size: 32px;
}

p {
  color: #444;
  font-size: 16px;
}

.buttons {
  margin-top: 40px;
}

/* YES BUTTON */
#yes {
  padding: 12px 28px;
  font-size: 18px;
  background: #00b894;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* NO BUTTON */
#no {
  padding: 10px 18px;
  font-size: 14px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 10px;
  position: fixed;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

/* FLOATING EMOJIS */
.float {
  position: fixed;
  font-size: 20px;
  animation: rise 4s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 💥 SHAKE EFFECT */
@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(5px, -5px); }
  50% { transform: translate(-5px, 5px); }
  75% { transform: translate(5px, 5px); }
  100% { transform: translate(0, 0); }
}

.shake {
  animation: shake 0.3s;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="fadeText t1">To My One & Only ❤️</div>
  <div class="fadeText t2">From S 😌</div>
  <div class="fadeText t3">Happy Birthday, My Precious 🎂✨</div>
</div>

<!-- MAIN -->
<div id="main">
  <h1>Choose wisely…</h1>
  <p>Your future depends on this 😌</p>

  <div class="buttons">
    <button id="yes">Yes 💚</button>
    <button id="no">No ❌</button>
  </div>

  <audio id="voice" src="voice.mp3"></audio>
</div>

<script>
// show main
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 6500);

// savage messages 😏
let messages = [
  "Are you sure SJ deserves this? 🤨",
  "Think again habibi 😏",
  "Wrong answer 😤",
  "Dubai boy behave 😌",
  "Last chance 😭",
  "Pookie please 🥺",
  "You really said no?? 😳",
  "Testing me? brave 😤",
  "Final warning ⚠️",
  "I will remember this 🙂",

  "Excuse me?? audacity much 😭",
  "Wrong… but confidently wrong 😌",
  "You woke up and chose chaos huh 😏",
  "Delulu level: expert 😌✨",
  "Luxury taste but poor decisions 😏",
  "You had ONE job 😭",
  "Try again with brain ON pls 😤",
  "This is a red flag moment 🚩😌",
  "Okay drama king relax 😭",
  "You really pressed that?? 😳",
  "Not you embarrassing yourself voluntarily 😭",
  "I’m pretending I didn’t see that 😏",
  "You tried… that’s what matters 🥺",
  "This is why we double check things 😭",
  "My expectations were low but WOW 😭",
  "Do you need a minute to rethink? 😤",
  "Try again but this time… with sense 😭",
  "That was a choice… not a good one 😏",
  "I love the confidence, hate the result 😳",
  "Not you doing this with full confidence 😭",
  "I’m concerned but also entertained 😳",
  "You had potential… where did it go 😭",
  "This is why we don’t rush things 😌",
  "It’s the confidence for me 😏",
  "I wish I could unsee that 😭",
  "I’m judging… silently but deeply 😏"
];

let i = 0;
let growth = 0;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

// 🔥 move + shake + grow
function moveButton() {
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;
  const padding = 20;

  const maxX = window.innerWidth - btnWidth - padding;
  const maxY = window.innerHeight - btnHeight - padding;

  const minX = padding;
  const minY = padding;

  let x = Math.random() * (maxX - minX) + minX;
  let y = Math.random() * (maxY - minY) + minY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.transform = "none";

  // 😏 savage text
  noBtn.innerText = messages[i % messages.length];
  i++;

  // 💥 shake screen
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 300);

  // 📈 grow YES button slowly
  growth += 1;
  let scale = 1 + (growth * 0.1);
  yesBtn.style.transform = `scale(${scale})`;
}

// mobile + desktop
noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

// YES click
yesBtn.addEventListener("click", () => {
  document.getElementById("voice").play();

  document.body.innerHTML = `
    <h1 style="margin-top:100px; font-family:'Playfair Display'; color:#b30059;">
      YAAAYYY 😍❤️
    </h1>
    <p style="font-size:20px;">Happy Birthday My Love 🎂✨</p>
    <p style="font-size:16px;">From your SJ always 💖</p>
    <p style="font-size:16px;">You chose wisely 😌💅</p>
    <p style="font-size:16px;">Your gift = Me 😏</p>
    <p style="font-size:14px;">Now call & love SJ ASAP 📞</p>
  `;

  setInterval(() => {
    let el = document.createElement("div");
    el.className = "float";

    let items = ["💖","🍾","✨","🥂"];
    el.innerText = items[Math.floor(Math.random() * items.length)];

    el.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 4000);
  }, 200);
});
</script>

</body>
</html>
